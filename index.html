<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Simple WebAR Marker Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <!-- A-Frame and AR.js. These load from public CDNs, so the phone needs internet access. -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #instructions {
      position: fixed;
      z-index: 10;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font-size: 15px;
      line-height: 1.35;
    }

    #instructions strong {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
    }

    #marker-status {
      position: fixed;
      z-index: 11;
      top: 10px;
      left: 10px;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      font-size: 13px;
    }

    a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div id="marker-status">Looking for marker...</div>

  <div id="instructions">
    <strong>AR test</strong>
    Allow camera access, then point your phone at a printed HIRO marker.
    Move closer/further away if the model is too small or too large.
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  >
    <a-assets>
      <a-asset-item id="test-model" src="./model.glb"></a-asset-item>
    </a-assets>

    <!-- Standard AR.js HIRO marker -->
    <a-marker preset="hiro" id="hiro-marker">
      <!--
        Scale/position/rotation are deliberately easy to tweak.

        If the model is huge: reduce scale, e.g. 0.05 0.05 0.05
        If the model is tiny: increase scale, e.g. 1 1 1
        If the model is sideways: change rotation.
      -->
      <a-entity
        id="spinning-model"
        gltf-model="#test-model"
        position="0 0.45 0"
        rotation="0 0 0"
        scale="0.35 0.35 0.35"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"
      ></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector("#hiro-marker");
    const status = document.querySelector("#marker-status");

    marker.addEventListener("markerFound", () => {
      status.textContent = "Marker found";
      status.style.background = "rgba(0, 110, 40, 0.75)";
    });

    marker.addEventListener("markerLost", () => {
      status.textContent = "Looking for marker...";
      status.style.background = "rgba(0, 0, 0, 0.7)";
    });
  </script>
</body>
</html>
