<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Geolocated WebAR Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <!-- A-Frame and AR.js location-based AR -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #panel {
      position: fixed;
      z-index: 20;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font-size: 14px;
      line-height: 1.35;
    }

    #panel strong {
      display: block;
      margin-bottom: 4px;
      font-size: 16px;
    }

    #status {
      position: fixed;
      z-index: 21;
      top: 10px;
      left: 10px;
      right: 10px;
      padding: 9px 11px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="status">Starting camera and location...</div>

  <div id="panel">
    <strong>Geolocated AR test</strong>
    Allow camera and location access. Stand outside near the test point, then slowly turn around.
    The model is placed 10m above the test point and scaled large:<br>
    Lat 52.107386, Long 1.356926
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
  >
    <a-assets>
      <a-asset-item id="test-model" src="./model.glb"></a-asset-item>
    </a-assets>

    <!-- Camera with GPS tracking. gpsMinDistance controls how often position updates are processed. -->
    <a-camera gps-new-camera="gpsMinDistance: 1"></a-camera>

    <!-- The geolocated object. Tweak scale if it appears too large or too small. -->
    <a-entity
      id="geo-model"
      gps-new-entity-place="latitude: 52.107386; longitude: 1.356926"
      gltf-model="#test-model"
      position="0 10 0"
      rotation="0 0 0"
      scale="14 14 14"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 9000; easing: linear"
    ></a-entity>
  </a-scene>

  <script>
    const statusEl = document.getElementById("status");
    const targetLat = 52.107386;
    const targetLon = 1.356926;

    function distanceMetres(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    if ("geolocation" in navigator) {
      navigator.geolocation.watchPosition(
        position => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const accuracy = Math.round(position.coords.accuracy || 0);
          const distance = Math.round(distanceMetres(lat, lon, targetLat, targetLon));
          statusEl.textContent = `GPS active. Accuracy about ${accuracy}m. Target about ${distance}m away. Slowly turn around.`;
        },
        error => {
          statusEl.textContent = "Location problem: " + error.message;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 0,
          timeout: 15000
        }
      );
    } else {
      statusEl.textContent = "This browser does not support geolocation.";
    }
  </script>
</body>
</html>
