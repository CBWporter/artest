<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Static Duck E - HIRO Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #status {
      position: fixed;
      z-index: 20;
      top: 10px;
      left: 10px;
      right: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      text-align: center;
      font-size: 14px;
    }

    #instructions {
      position: fixed;
      z-index: 20;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      font-size: 15px;
      line-height: 1.35;
    }

    #instructions strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
  <div id="status">Looking for HIRO marker...</div>

  <div id="instructions">
    <strong>STATIC DUCK E — v015 — no GPS</strong>
    Uses facingduck.glb. No rotation. Duck orientation is set to E: rotation 90 0 0.
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  >
    <a-assets>
      <a-asset-item id="facing-duck-model" src="./facingduck.glb"></a-asset-item>
    </a-assets>

    <a-marker
      preset="hiro"
      id="hiro-marker"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >

      <a-entity
        id="duck-display-pivot"
        position="0 0.8 0"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear"
      >
        <a-entity
          id="facing-duck"
          gltf-model="#facing-duck-model"
          position="0 0 0"
          rotation="-90 0 180"
          scale="3 3 3"
        ></a-entity>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector("#hiro-marker");
    const status = document.querySelector("#status");

    marker.addEventListener("markerFound", () => {
      status.textContent = "Marker found - STATIC DUCK E v015";
      status.style.background = "rgba(0, 110, 40, 0.78)";
    });

    marker.addEventListener("markerLost", () => {
      status.textContent = "Looking for HIRO marker...";
      status.style.background = "rgba(0, 0, 0, 0.75)";
    });
  </script>
</body>
</html>
