<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Duck Orientation Diagnostic</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #status {
      position: fixed;
      z-index: 20;
      top: 10px;
      left: 10px;
      right: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      text-align: center;
      font-size: 14px;
    }

    #instructions {
      position: fixed;
      z-index: 20;
      left: 10px;
      right: 10px;
      bottom: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.78);
      color: white;
      font-size: 15px;
      line-height: 1.35;
    }

    #instructions strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }
  </style>
</head>

<body>
  <div id="status">Looking for HIRO marker...</div>

  <div id="instructions">
    <strong>DUCK ORIENTATION DIAGNOSTIC — no GPS</strong>
    Six ducks are shown with different rotations. Tell me which letter looks closest to the correct upright side-facing duck.
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
  >
    <a-assets>
      <a-asset-item id="facing-duck-model" src="./facingduck.glb"></a-asset-item>
    </a-assets>

    <a-marker
      preset="hiro"
      id="hiro-marker"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >

      <!-- Row 1: no tilt, just Y-axis facing changes -->
      <a-entity position="-0.7 0.4 -0.45">
        <a-text value="A 0 0 0" align="center" color="red" width="2" position="0 0.45 0" rotation="-90 0 0"></a-text>
        <a-entity gltf-model="#facing-duck-model" position="0 0 0" rotation="0 0 0" scale="1.3 1.3 1.3"></a-entity>
      </a-entity>

      <a-entity position="0 0.4 -0.45">
        <a-text value="B 0 90 0" align="center" color="red" width="2" position="0 0.45 0" rotation="-90 0 0"></a-text>
        <a-entity gltf-model="#facing-duck-model" position="0 0 0" rotation="0 90 0" scale="1.3 1.3 1.3"></a-entity>
      </a-entity>

      <a-entity position="0.7 0.4 -0.45">
        <a-text value="C 0 180 0" align="center" color="red" width="2" position="0 0.45 0" rotation="-90 0 0"></a-text>
        <a-entity gltf-model="#facing-duck-model" position="0 0 0" rotation="0 180 0" scale="1.3 1.3 1.3"></a-entity>
      </a-entity>

      <!-- Row 2: tilt/roll corrections -->
      <a-entity position="-0.7 0.4 0.45">
        <a-text value="D 90 0 0" align="center" color="red" width="2" position="0 0.45 0" rotation="-90 0 0"></a-text>
        <a-entity gltf-model="#facing-duck-model" position="0 0 0" rotation="90 0 0" scale="1.3 1.3 1.3"></a-entity>
      </a-entity>

      <a-entity position="0 0.4 0.45">
        <a-text value="E -90 0 0" align="center" color="red" width="2" position="0 0.45 0" rotation="-90 0 0"></a-text>
        <a-entity gltf-model="#facing-duck-model" position="0 0 0" rotation="-90 0 0" scale="1.3 1.3 1.3"></a-entity>
      </a-entity>

      <a-entity position="0.7 0.4 0.45">
        <a-text value="F 0 0 90" align="center" color="red" width="2" position="0 0.45 0" rotation="-90 0 0"></a-text>
        <a-entity gltf-model="#facing-duck-model" position="0 0 0" rotation="0 0 90" scale="1.3 1.3 1.3"></a-entity>
      </a-entity>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    const marker = document.querySelector("#hiro-marker");
    const status = document.querySelector("#status");

    marker.addEventListener("markerFound", () => {
      status.textContent = "Marker found - orientation diagnostic";
      status.style.background = "rgba(0, 110, 40, 0.78)";
    });

    marker.addEventListener("markerLost", () => {
      status.textContent = "Looking for HIRO marker...";
      status.style.background = "rgba(0, 0, 0, 0.75)";
    });
  </script>
</body>
</html>
